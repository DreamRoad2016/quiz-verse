<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Studio · Quiz Verse</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    :root {
      --bg0:#070a0f; --bg1:#0d1219; --card:rgba(22,30,42,.72); --stroke:rgba(120,160,255,.14);
      --text:#e9eef7; --muted:#8b9cb5; --accent:#5c9cff; --accent2:#69f0ae; --danger:#ff6b6b;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
      --sans: "DM Sans", system-ui, "Segoe UI", sans-serif;
    }
    @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap");
    * { box-sizing: border-box; }
    body { margin:0; font-family: var(--sans); background: var(--bg0); color: var(--text); min-height: 100vh; }
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(900px 500px at 12% -10%, rgba(92,156,255,.22), transparent 55%),
        radial-gradient(700px 420px at 88% 0%, rgba(105,240,174,.12), transparent 50%),
        radial-gradient(600px 400px at 50% 100%, rgba(92,156,255,.08), transparent 45%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    header.hero {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--stroke);
      backdrop-filter: blur(12px);
      background: rgba(10,14,20,.55);
    }
    .hero h1 { margin:0 0 6px; font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em; }
    .hero p { margin:0; color: var(--muted); font-size: .88rem; line-height: 1.55; max-width: 720px; }
    .hero code { font-family: var(--mono); font-size: .82em; color: #b3d4ff; background: rgba(0,0,0,.25); padding: 1px 6px; border-radius: 4px; }
    main.layout { flex: 1; display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 0; }
    @media (max-width: 920px) {
      main.layout { grid-template-columns: 1fr; }
      aside { border-right: none !important; border-bottom: 1px solid var(--stroke); }
    }
    aside {
      border-right: 1px solid var(--stroke);
      background: rgba(8,11,16,.4);
      padding: 20px 16px 32px;
    }
    .aside-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; }
    select.tsel {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--stroke);
      background: rgba(0,0,0,.35); color: var(--text); font-size: .88rem; margin-bottom: 16px;
    }
    .schema { max-height: 42vh; overflow: auto; font-size: .72rem; font-family: var(--mono); color: var(--muted); line-height: 1.45; }
    .schema .pk { color: var(--accent2); font-weight: 600; }
    .content { padding: 20px 22px 40px; }
    .gate { max-width: 440px; margin: 48px auto; padding: 28px; border-radius: 16px; border: 1px solid var(--stroke);
      background: var(--card); backdrop-filter: blur(14px); box-shadow: 0 24px 80px rgba(0,0,0,.45); }
    .gate h2 { margin: 0 0 12px; font-size: 1.1rem; }
    .gate input {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--stroke);
      background: rgba(0,0,0,.35); color: var(--text); font-size: .95rem; margin: 10px 0 14px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; font-weight: 600; font-size: .86rem;
      cursor: pointer; background: rgba(255,255,255,.06); color: var(--text); margin: 4px 6px 4px 0;
    }
    .btn:hover { background: rgba(255,255,255,.1); }
    .btn-primary { background: linear-gradient(135deg, #3d7eff, #5c9cff); border-color: rgba(255,255,255,.12); color: #fff; }
    .btn-primary:hover { filter: brightness(1.06); }
    .btn-ghost { border-color: var(--stroke); }
    .btn-danger { background: rgba(255,107,107,.15); border-color: rgba(255,107,107,.35); color: #ffc9c9; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px;
      padding: 14px 16px; border-radius: 14px; border: 1px solid var(--stroke); background: var(--card); backdrop-filter: blur(10px);
    }
    .toolbar input[type="text"] {
      flex: 1; min-width: 160px; max-width: 280px; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--stroke);
      background: rgba(0,0,0,.3); color: var(--text); font-size: .88rem;
    }
    .pill { font-size: .72rem; color: var(--muted); padding: 4px 10px; border-radius: 999px; border: 1px solid var(--stroke); }
    .table-shell {
      border-radius: 14px; border: 1px solid var(--stroke); overflow: hidden;
      background: var(--card); backdrop-filter: blur(10px); box-shadow: 0 16px 50px rgba(0,0,0,.25);
    }
    .table-scroll { overflow-x: auto; }
    table.grid { width: 100%; border-collapse: collapse; font-size: .78rem; font-family: var(--mono); }
    .grid th {
      text-align: left; padding: 11px 12px; background: rgba(0,0,0,.35); color: var(--muted); font-weight: 600;
      border-bottom: 1px solid var(--stroke); white-space: nowrap;
    }
    .grid td {
      padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #dbe5f5;
    }
    .grid tr:hover td { background: rgba(92,156,255,.06); }
    .grid .act { white-space: nowrap; max-width: none; }
    .pager { margin-top: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; color: var(--muted); font-size: .84rem; }
    .msg { margin: 12px 0; padding: 12px 14px; border-radius: 10px; font-size: .86rem; border: 1px solid var(--stroke); background: rgba(0,0,0,.25); }
    .msg.err { border-color: rgba(255,107,107,.45); color: #ffc9c9; }
    .modal-bg {
      position: fixed; inset: 0; z-index: 40; background: rgba(4,6,10,.72); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      width: min(920px, 100%); max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;
      border-radius: 16px; border: 1px solid var(--stroke); background: rgba(16,22,32,.96); box-shadow: 0 30px 100px rgba(0,0,0,.55);
    }
    .modal-h {
      padding: 16px 20px; border-bottom: 1px solid var(--stroke); display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .modal-h span { font-size: .9rem; color: var(--muted); }
    .modal-body { padding: 16px 20px; flex: 1; overflow: auto; }
    .modal-body textarea {
      width: 100%; min-height: 360px; border-radius: 10px; border: 1px solid var(--stroke);
      background: #0a0e14; color: #d6e9ff; font-family: var(--mono); font-size: .78rem; line-height: 1.45; padding: 14px; resize: vertical;
    }
    .modal-ft { padding: 14px 20px; border-top: 1px solid var(--stroke); display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .import-box { margin-top: 16px; padding: 16px; border-radius: 14px; border: 1px dashed rgba(92,156,255,.35); background: rgba(92,156,255,.04); }
    .import-box textarea { min-height: 140px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div id="app" class="wrap">
    <div v-if="!authed" class="gate">
      <h1 style="margin:0 0 8px;font-size:1.35rem;">Data Studio</h1>
      <p style="color:var(--muted);font-size:.86rem;line-height:1.5;margin:0 0 16px;">
        通用数据管理入口 <code>/db-admin.html</code>（旧 <code>/db-lol-admin.html</code> 已跳转）。在 <code>quiz.admin.tables</code> 配置表白名单。
      </p>
      <h2 style="margin:0 0 10px;font-size:1rem;">验证管理密钥</h2>
      <input type="password" v-model="keyInput" placeholder="X-Admin-Key" @keydown.enter="enterGate" />
      <button class="btn btn-primary" @click="enterGate">进入</button>
      <p v-if="gateErr" class="msg err" style="margin-top:14px;">{{ gateErr }}</p>
    </div>

    <template v-else>
      <header class="hero">
        <h1>Data Studio</h1>
        <p>
          在 <code>application.yml</code> 的 <code>quiz.admin.tables</code> 里<strong>追加表名</strong>即可启用该表；无需为每张表单独写页面。
          JSON 字段名为 <strong>snake_case</strong>，与数据库列一致。请求需带 <code>X-Admin-Key</code>。
        </p>
      </header>
      <main class="layout">
        <aside>
          <div class="aside-title">数据表</div>
          <select class="tsel" v-model="table" @change="onTableChange">
            <option v-for="t in tables" :key="t" :value="t">{{ t }}</option>
          </select>
          <div class="aside-title">列结构</div>
          <div class="schema" v-if="schema">
            <div v-for="c in schema.columns" :key="c.name">
              <span :class="{ pk: c.name === schema.pkColumn }">{{ c.name }}</span>
              <span style="opacity:.65;"> · {{ c.typeName }}</span>
            </div>
          </div>
        </aside>
        <section class="content">
          <div class="toolbar">
            <input type="text" v-model="q" placeholder="模糊搜索（可搜索列）" @keydown.enter="reload" />
            <button class="btn btn-primary" @click="reload">刷新</button>
            <button class="btn btn-ghost" @click="openCreate">新建（JSON）</button>
            <button class="btn btn-ghost" @click="exportFile">导出 JSON</button>
            <span class="pill" v-if="schema">PK: {{ schema.pkColumn }}</span>
          </div>

          <div class="import-box">
            <div style="font-size:.85rem;color:var(--muted);">批量导入：粘贴 <strong>JSON 数组</strong>（与导出格式相同），按主键 upsert。</div>
            <textarea v-model="importText" placeholder='[ { "id": "...", "game_id": "...", ... }, ... ]'></textarea>
            <button class="btn btn-primary" style="margin-top:10px;" @click="doImport">执行导入</button>
          </div>

          <p v-if="msg" class="msg" :class="{ err: msgErr }">{{ msg }}</p>

          <div class="table-shell">
            <div class="table-scroll">
              <table class="grid">
                <thead>
                  <tr>
                    <th v-for="col in displayCols" :key="col">{{ col }}</th>
                    <th class="act">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(row, idx) in rows" :key="rowKey(row, idx)">
                    <td v-for="col in displayCols" :key="col" :title="cellTitle(row[col])">{{ previewCell(row[col]) }}</td>
                    <td class="act">
                      <button class="btn btn-ghost" @click="openJson(row)">JSON</button>
                      <button class="btn btn-ghost" @click="openEdit(row)">编辑</button>
                      <button class="btn btn-danger" @click="remove(row)">删</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="pager">
            <span>共 {{ total }} 行</span>
            <button class="btn btn-ghost" :disabled="page<=0" @click="page--; reload()">上一页</button>
            <span>第 {{ page+1 }} 页 · 每页 {{ size }}</span>
            <button class="btn btn-ghost" :disabled="(page+1)*size>=total" @click="page++; reload()">下一页</button>
          </div>
        </section>
      </main>
    </template>

    <div v-if="modal" class="modal-bg" @click.self="modal=null">
      <div class="modal">
        <div class="modal-h">
          <strong>{{ modalTitle }}</strong>
          <span>{{ table }}</span>
        </div>
        <div class="modal-body">
          <textarea v-model="modalText" spellcheck="false"></textarea>
        </div>
        <div class="modal-ft">
          <button v-if="modal==='edit' || modal==='create'" class="btn btn-primary" @click="saveModal">保存</button>
          <button class="btn btn-ghost" @click="modal=null">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const HDR = 'X-Admin-Key';
    const SK = 'quizAdminDataKey';
    const { createApp } = Vue;

    function client(key) {
      const h = axios.create({ baseURL: API });
      h.interceptors.request.use((cfg) => { cfg.headers[HDR] = key; return cfg; });
      return h;
    }

    createApp({
      data() {
        return {
          authed: false, keyInput: '', gateErr: '', http: null,
          tables: [], table: '', schema: null,
          q: '', page: 0, size: 18, total: 0, rows: [],
          msg: '', msgErr: false, importText: '',
          modal: null, modalTitle: '', modalText: '', modalPk: null
        };
      },
      computed: {
        displayCols() {
          if (!this.schema || !this.rows.length) {
            if (this.schema && this.schema.columns) {
              return this.schema.columns.slice(0, 10).map((c) => c.name);
            }
            return [];
          }
          const pk = this.schema.pkColumn;
          const names = this.schema.columns.map((c) => c.name);
          const rest = names.filter((n) => n !== pk);
          const pick = [pk, ...rest.filter((_, i) => i < 9)];
          return pick;
        }
      },
      mounted() {
        const k = sessionStorage.getItem(SK);
        if (k) { this.http = client(k); this.authed = true; this.bootstrap(); }
      },
      methods: {
        async enterGate() {
          this.gateErr = '';
          const k = this.keyInput.trim();
          if (!k) { this.gateErr = '请输入密钥'; return; }
          const h = client(k);
          try {
            const { data } = await h.get('/api/admin/meta/tables');
            if (!data.isSuccess) throw new Error(data.resultMsg);
            sessionStorage.setItem(SK, k);
            this.http = h;
            this.authed = true;
            await this.bootstrap();
          } catch (e) {
            this.gateErr = e.response?.data?.resultMsg || e.message;
          }
        },
        async bootstrap() {
          const { data } = await this.http.get('/api/admin/meta/tables');
          if (!data.isSuccess) throw new Error(data.resultMsg);
          this.tables = data.resultData || [];
          if (!this.tables.length) {
            this.msg = '白名单为空：请在 quiz.admin.tables 中配置表名';
            this.msgErr = true;
            return;
          }
          if (!this.table || !this.tables.includes(this.table)) this.table = this.tables[0];
          await this.loadSchema();
          await this.reload();
        },
        async loadSchema() {
          const { data } = await this.http.get('/api/admin/meta/tables/' + encodeURIComponent(this.table) + '/schema');
          if (!data.isSuccess) throw new Error(data.resultMsg);
          this.schema = data.resultData;
        },
        async onTableChange() {
          this.page = 0;
          this.msg = '';
          await this.loadSchema();
          await this.reload();
        },
        async reload() {
          this.msg = '';
          try {
            const { data } = await this.http.get('/api/admin/tables/' + encodeURIComponent(this.table) + '/rows', {
              params: { page: this.page, size: this.size, q: this.q || undefined }
            });
            if (!data.isSuccess) throw new Error(data.resultMsg);
            const p = data.resultData;
            this.total = p.total;
            this.rows = p.rows || [];
          } catch (e) {
            this.msg = e.response?.data?.resultMsg || e.message;
            this.msgErr = true;
          }
        },
        rowKey(row, idx) {
          const pk = this.schema && this.schema.pkColumn;
          return pk && row[pk] != null ? String(row[pk]) : 'r' + idx;
        },
        previewCell(v) {
          if (v == null) return '∅';
          if (Array.isArray(v)) return '[' + v.slice(0, 3).join(', ') + (v.length > 3 ? ', …' : '') + ']';
          const s = String(v);
          return s.length > 48 ? s.slice(0, 45) + '…' : s;
        },
        cellTitle(v) {
          if (v == null) return '';
          return typeof v === 'object' ? JSON.stringify(v) : String(v);
        },
        openJson(row) {
          this.modal = 'view';
          this.modalTitle = '行 JSON（只读）';
          this.modalText = JSON.stringify(row, null, 2);
          this.modalPk = null;
        },
        openEdit(row) {
          this.modal = 'edit';
          this.modalTitle = '编辑行';
          this.modalText = JSON.stringify(row, null, 2);
          this.modalPk = row[this.schema.pkColumn];
        },
        openCreate() {
          const tpl = {};
          if (this.schema) {
            this.schema.columns.forEach((c) => { tpl[c.name] = c.array ? [] : null; });
          }
          this.modal = 'create';
          this.modalTitle = '新建行（JSON，UUID 主键可省略）';
          this.modalText = JSON.stringify(tpl, null, 2);
          this.modalPk = null;
        },
        async saveModal() {
          try {
            const obj = JSON.parse(this.modalText);
            if (this.modal === 'create') {
              const { data } = await this.http.post('/api/admin/tables/' + encodeURIComponent(this.table) + '/rows', obj);
              if (!data.isSuccess) throw new Error(data.resultMsg);
              this.msg = '已创建';
              this.msgErr = false;
            } else {
              const pk = encodeURIComponent(String(this.modalPk));
              const { data } = await this.http.put('/api/admin/tables/' + encodeURIComponent(this.table) + '/rows/' + pk, obj);
              if (!data.isSuccess) throw new Error(data.resultMsg);
              this.msg = '已保存';
              this.msgErr = false;
            }
            this.modal = null;
            await this.reload();
          } catch (e) {
            this.msg = e.response?.data?.resultMsg || e.message;
            this.msgErr = true;
          }
        },
        async remove(row) {
          const pk = row[this.schema.pkColumn];
          if (!confirm('删除主键 ' + pk + ' ?')) return;
          try {
            const url = '/api/admin/tables/' + encodeURIComponent(this.table) + '/rows/' + encodeURIComponent(String(pk));
            const { data } = await this.http.delete(url);
            if (!data.isSuccess) throw new Error(data.resultMsg);
            this.msg = '已删除';
            this.msgErr = false;
            await this.reload();
          } catch (e) {
            this.msg = e.response?.data?.resultMsg || e.message;
            this.msgErr = true;
          }
        },
        async exportFile() {
          try {
            const res = await this.http.get('/api/admin/tables/' + encodeURIComponent(this.table) + '/-/export', { responseType: 'blob' });
            const blob = new Blob([res.data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = this.table + '-export.json';
            a.click();
            URL.revokeObjectURL(a.href);
          } catch (e) {
            this.msg = '导出失败';
            this.msgErr = true;
          }
        },
        async doImport() {
          this.msg = '';
          try {
            const arr = JSON.parse(this.importText);
            if (!Array.isArray(arr)) throw new Error('须为 JSON 数组');
            const { data } = await this.http.post('/api/admin/tables/' + encodeURIComponent(this.table) + '/-/import', arr);
            if (!data.isSuccess) throw new Error(data.resultMsg);
            this.msg = '导入完成，upsert ' + data.resultData.upserted + ' 行';
            this.msgErr = false;
            this.importText = '';
            await this.reload();
          } catch (e) {
            this.msg = e.response?.data?.resultMsg || e.message;
            this.msgErr = true;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
