# Quiz Verse — local defaults
# Match store: memory (default, no Redis needed) | redis
# Packs: classpath:/packs  and optional file override via quiz.packs.extra-dir

server:
  port: 8098

spring:
  application:
    name: quiz-verse
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

quiz:
  match:
    store: ${QUIZ_MATCH_STORE:memory}
    ttl-hours: 24
  packs:
    classpath-location: classpath:/packs
    # Optional absolute/relative dir for local pack overrides (empty = skip)
    extra-dir: ${QUIZ_PACKS_DIR:}

logging:
  level:
    net.quizverse: INFO
